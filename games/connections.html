<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Connections · Maki</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&family=Karnak+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="game-page">
  <header class="game-header">
    <div class="game-header-inner">
      <a href="../index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </a>
      <h1 class="game-title">Connections</h1>
      <div class="game-actions">
        <span class="game-timer" id="gameTimer">0:00</span>
      </div>
    </div>
  </header>

  <main class="conn-page">
    <p class="conn-intro">Create four groups of four!</p>
    <p class="conn-sub">Find groups of items that share something in common.</p>

    <div class="conn-solved" id="connSolved"></div>
    <div class="conn-board" id="connBoard"></div>

    <div class="conn-mistakes">
      Mistakes remaining:
      <span class="conn-dots" id="connDots"></span>
    </div>

    <div class="conn-actions">
      <button class="btn" id="btnShuffle">Shuffle</button>
      <button class="btn" id="btnDeselect">Deselect all</button>
      <button class="btn btn-primary" id="btnSubmit">Submit</button>
    </div>
  </main>

  <div class="modal-backdrop" id="winModal">
    <div class="modal">
      <button class="modal-close">&times;</button>
      <h2>Nice work!</h2>
      <p class="modal-body">You found them all.</p>
      <a class="btn btn-primary" href="../index.html">Back to games</a>
    </div>
  </div>

  <script>window.GAME_TIMER_KEY = 'connections';</script>
  <script src="../data/connections.js"></script>
  <script src="../js/timer.js"></script>
  <script src="../js/connections.js"></script>
</body>
</html>
