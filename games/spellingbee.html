<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Bee · Maki</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&family=Karnak+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="game-page">
  <header class="game-header">
    <div class="game-header-inner">
      <a href="../index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </a>
      <h1 class="game-title">Spelling Bee</h1>
      <div style="width:80px"></div>
    </div>
  </header>

  <main class="sb-page">
    <div class="sb-left">
      <div class="sb-input" id="sbInput"></div>
      <div class="sb-hive" id="sbHive"></div>
      <div class="sb-controls">
        <button class="btn" id="sbDelete">Delete</button>
        <button class="btn" id="sbShuffle">Shuffle</button>
        <button class="btn btn-primary" id="sbEnter">Enter</button>
      </div>
      <p style="font-family:var(--serif);font-style:italic;color:var(--ink-soft);margin-top:8px;">
        Make as many words as you can using these 7 letters. Each word must use the center letter.
      </p>
    </div>

    <div class="sb-right">
      <div class="sb-progress">
        <span class="sb-rank" id="sbRank">Beginner</span>
        <div class="sb-bar"><div class="sb-bar-fill" id="sbBarFill"></div></div>
        <span id="sbScore">0</span>
      </div>
      <div class="sb-found">
        <h4>Words found</h4>
        <ul id="sbFound"></ul>
      </div>
    </div>
  </main>

  <script src="../data/spellingbee.js"></script>
  <script src="../js/spellingbee.js"></script>
</body>
</html>
